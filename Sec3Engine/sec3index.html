<html>
<head>
 <meta charset="utf-8"/>
 <title>WebGL Render View</title>
 <style>
  html,
  body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  #webglview {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #uiWrapper {
    position: fixed;
    top: 12px;
    right: 12px;
    width: 300px;
    max-height: calc(100vh - 24px);
    overflow: auto;
    z-index: 10;
    padding: 12px;
    border-radius: 10px;
    background: rgba(8, 12, 20, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #eef3ff;
    font: 12px/1.3 "Helvetica Neue", Helvetica, Arial, sans-serif;
  }

  #uiWrapper input[type="range"] {
    width: 100%;
  }

  #uiWrapper input[type="button"] {
    width: 100%;
  }

  #message {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 11;
  }
 </style>
</head>
<body>
	<div id="uiWrapper"></div>
	<div id="message"></div>
	<canvas id="webglview" width="1920" height="1080">
	WebGL unavailable.
	</canvas>

	<script src="js/core/Chunker.js" type ="text/javascript"></script>
	<script src="js/core/shaderCreator.js" type ="text/javascript"></script>	
	<script src="js/core/SceneObject.js" type ="text/javascript"></script>	
	<script src="js/core/projector.js" type ="text/javascript"></script>
	<script src="js/core/PerspProjector.js" type ="text/javascript"></script>
	<script src="js/core/OrthoProjector.js" type ="text/javascript"></script>	
	<script src="js/core/Scene.js" type ="text/javascript"></script>
	<script src="js/math/gl-matrix.js" type ="text/javascript"></script>
	<script src="js/3party/threejs/three.js" type="text/javascript"></script>
	<script src="js/3party/threejs/OBJLoader.js" type="text/javascript"></script>
	<script src="js/3party/threejs/MTLLoader.js" type="text/javascript"></script>
	<script src="js/3party/threejs/OBJMTLLoader.js" type="text/javascript"></script>

	<script src="js/core/shader-util.js" type ="text/javascript"></script>
	<script src="js/core/webgl-util.js" type ="text/javascript"></script>
	<script src="js/core/fbo-util.js" type="text/javascript"></script>
	<script src="js/core/camera.js" type ="text/javascript"></script>
	<script src="js/core/SpotLight.js" type ="text/javascript"></script>
	<script src="js/core/DirectionalLight.js" type ="text/javascript"></script>	
	<script src="js/core/cameraInteractor.js" type ="text/javascript"></script>
	<script src="js/core/texture.js" type ="text/javascript"></script>
	<script src="js/core/obj-loader.js" type="text/javascript"></script>
	<script src="js/math/UI.js" type="text/javascript"></script>	
	<script src="js/math/math.js" type="text/javascript"></script>	
	<script src="js/core/ParticleSystem.js" type="text/javascript"></script>
	<script src="js/core/extensions.js" type="text/javascript"></script>
	<script src="js/core/geometry.js" type="text/javascript"></script>
	<script src="js/core/renderer.js" type="text/javascript"></script>	
	<script src="js/core/postFx.js" type="text/javascript"></script>	

	<script src="js/Floor.js"></script>
	<script src="js/screenQuad.js"></script>
	<script src="demos/SEC3DEMO.js"></script>
	<script type ="text/javascript">
	main( "webglview", "message" );
 </script>
</body>
</html>
